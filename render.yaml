services:
  - type: web
    name: arogya-sahayak-api
    runtime: python
    region: singapore   # Closest to India
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false       # You set this manually in Render dashboard
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
